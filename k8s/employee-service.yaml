apiVersion: v1
kind: Service
metadata:
  name: employee-service
spec:
  type: NodePort      # Opening port for external use
  selector:
    app: employee-app # The "Glue" that finds your Java Pods
  ports:
    - port: 80        # The port the Service uses inside the cluster
      targetPort: 8080 # The port your Java app is listening on
      nodePort: 30001  # The port YOU use on your Linux Mint browser